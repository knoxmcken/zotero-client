<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Error — Zotero Client</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
</head>
<body class="bg-light">
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card border-danger">
          <div class="card-header bg-danger text-white">
            <strong>Zotero Client — Error</strong>
          </div>
          <div class="card-body">
            <p class="card-text">{{ message }}</p>
            <hr>
            <p class="text-muted small">
              Copy <code>.env.example</code> to <code>.env</code> and fill in your
              <code>ZOTERO_API_KEY</code> and <code>ZOTERO_USER_ID</code>, then restart
              the server with <code>zot web</code>.
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
