name: Integration Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      
      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short -m "not integration"
  
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
          pip install -e .

      - name: Create .env file from secrets
        run: |
          echo "ZOTERO_API_KEY=${{ secrets.ZOTERO_API_KEY }}" > .env
          echo "ZOTERO_USER_ID=${{ secrets.ZOTERO_USER_ID }}" >> .env
          echo "ZOTERO_LIBRARY_TYPE=users" >> .env
          # Verify .env file exists (without revealing secrets)
          if [ -f .env ]; then
            echo "✅ .env file created successfully"
          else
            echo "❌ Failed to create .env file"
            exit 1
          fi
      
      - name: Run integration tests
        env:
          ZOTERO_API_KEY: ${{ secrets.ZOTERO_API_KEY }}
          ZOTERO_USER_ID: ${{ secrets.ZOTERO_USER_ID }}
          ZOTERO_LIBRARY_TYPE: users
        run: |
          pytest tests/test_api/ -v --tb=short -m integration
      
      - name: Test CLI with real credentials
        env:
          ZOTERO_API_KEY: ${{ secrets.ZOTERO_API_KEY }}
          ZOTERO_USER_ID: ${{ secrets.ZOTERO_USER_ID }}
        run: |
          # Always test the help command (no credentials required)
          echo "Testing CLI help..."
          zot --help

          # Skip live API calls if credentials are not configured
          if [ -z "$ZOTERO_API_KEY" ] || [ -z "$ZOTERO_USER_ID" ]; then
            echo "⚠️  Zotero credentials not configured — skipping live API CLI tests"
            exit 0
          fi

          echo "Testing CLI items list..."
          zot items list --limit 5

          echo "Testing CLI collections list..."
          zot collections list

          echo "Testing CLI tags list..."
          zot tags list
      
      - name: Run full test suite with coverage
        env:
          ZOTERO_API_KEY: ${{ secrets.ZOTERO_API_KEY }}
          ZOTERO_USER_ID: ${{ secrets.ZOTERO_USER_ID }}
          ZOTERO_LIBRARY_TYPE: users
        run: |
          pytest tests/ -v --cov=zotero_client --cov-report=xml --cov-report=term
      
      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: integration
        continue-on-error: true
